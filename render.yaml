services:
  - type: web
    name: backstage
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter  # upgrade to 'standard' (1 GB RAM) if Backstage feels slow
    port: 7007
    healthCheckPath: /healthcheck
    envVars:
      - key: POSTGRES_HOST
        fromDatabase:
          name: backstage-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: backstage-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: backstage-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: backstage-db
          property: password
      - key: PGSSLMODE
        value: require
      - key: GITHUB_TOKEN
        sync: false  # set this manually in the Render dashboard

databases:
  - name: backstage-db
    plan: starter
    databaseName: backstage
    user: backstage
